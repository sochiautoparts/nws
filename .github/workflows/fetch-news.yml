name: Fetch Automotive News

# Runs every hour to keep data/bmw-news.json and data/auto-news.json fresh.
on:
  schedule:
    # Every hour at minute 5 (a bit off the top of the hour to avoid GitHub cron load spikes)
    - cron: "5 * * * *"
  workflow_dispatch:    # Manual trigger from Actions tab
  push:
    branches: [main]
    paths:
      - "fetch_news.py"
      - "requirements.txt"
      - ".github/workflows/fetch-news.yml"

permissions:
  contents: write       # Required to commit JSON files back to repo

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news parser
        run: |
          python fetch_news.py

      - name: Show summary
        run: |
          echo "=== BMW news ==="
          python -c "import json;d=json.load(open('data/bmw-news.json'));print(f'items: {d[\"total_items\"]}, sources: {d[\"sources_count\"]}')"
          echo "=== Auto news ==="
          python -c "import json;d=json.load(open('data/auto-news.json'));print(f'items: {d[\"total_items\"]}, sources: {d[\"sources_count\"]}')"

      - name: Commit & push JSON files
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage only the data files (don't accidentally commit logs etc.)
          git add data/bmw-news.json data/auto-news.json

          if git diff --staged --quiet; then
            echo "No changes to commit — JSON files are identical to last run."
            exit 0
          fi

          TIMESTAMP="$(date -u '+%Y-%m-%d %H:%M UTC')"
          git commit -m "chore(news): hourly refresh @ ${TIMESTAMP}

          - BMW news:   $(python -c "import json;print(json.load(open('data/bmw-news.json'))['total_items'])") items
          - Auto news:   $(python -c "import json;print(json.load(open('data/auto-news.json'))['total_items'])") items"

          git push
          echo "✓ Pushed updated JSON files"
